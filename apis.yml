    name: Finch API
    description: >-
      Unified REST API for HRIS, payroll, and benefits providers. Supports
      Company, Directory, Individual, Employment, Payment, Pay Statement, and
      Benefits resources. Authentication uses OAuth 2.0 via Finch Connect to
      issue per-employer bearer access tokens.
