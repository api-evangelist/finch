aid: finch
name: Finch
description: >-
  Finch is a unified employment API providing standardized read and write
  access to HRIS, payroll, and benefits systems. Through a single integration,
  developers can pull company directory data, individual PII, employment
  records, payments, pay statements, and benefits across hundreds of
  providers (ADP, Gusto, Paylocity, Workday, BambooHR, Rippling, Justworks,
  TriNet, and more). Finch Connect handles end-user authorization via OAuth.
